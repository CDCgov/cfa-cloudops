goal: Create a job with 3 dependent tasks using the cfaprdbatchcr.azurecr.io/simple_test_app:latest
  container. Each task runs a bash loop. Monitor the job. Store each task's output
  in output-test blob container under stderror_stdoutput/YYYY-MMM-DD.
workflow:
- id: create_pool_1
  method: create_pool
  depends_on: []
  args:
    pool_name: simple-test-pool
    mounts:
    - source: output-test
      target: /mnt/output-test
    container_image_name: cfaprdbatchcr.azurecr.io/simple_test_app:latest
    autoscale: false
    max_autoscale_nodes: 3
- id: create_job_1
  method: create_job
  depends_on:
  - create_pool_1
  args:
    job_name: simple-test-job
    pool_name: simple-test-pool
    save_logs_to_blob: output-test
    logs_folder: stderror_stdoutput/YYYY-MMM-DD
- id: add_task_1
  method: add_task
  depends_on:
  - create_job_1
  args:
    job_name: simple-test-job
    command_line: /bin/bash -c 'for i in {1..5}; do echo Task1 loop $i; sleep 1; done'
    name_suffix: task1
    depends_on: null
    run_dependent_tasks_on_fail: false
    container_image_name: cfaprdbatchcr.azurecr.io/simple_test_app:latest
- id: add_task_2
  method: add_task
  depends_on:
  - add_task_1
  args:
    job_name: simple-test-job
    command_line: /bin/bash -c 'for i in {1..5}; do echo Task2 loop $i; sleep 1; done'
    name_suffix: task2
    depends_on: task1
    run_dependent_tasks_on_fail: false
    container_image_name: cfaprdbatchcr.azurecr.io/simple_test_app:latest
- id: add_task_3
  method: add_task
  depends_on:
  - add_task_2
  args:
    job_name: simple-test-job
    command_line: /bin/bash -c 'for i in {1..5}; do echo Task3 loop $i; sleep 1; done'
    name_suffix: task3
    depends_on: task2
    run_dependent_tasks_on_fail: false
    container_image_name: cfaprdbatchcr.azurecr.io/simple_test_app:latest
- id: monitor_job_1
  method: monitor_job
  depends_on:
  - add_task_3
  args:
    job_name: simple-test-job
