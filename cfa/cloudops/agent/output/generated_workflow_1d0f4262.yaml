goal: Schedule a job that runs daily at 9 PM except weekends and computes the Measles
  inference using daily partition stored in input-test folder of CFAAzureBatchPrd
  storage account. Use the measles-script:v1 container for this job.
workflow:
- id: create_pool_measles
  method: create_pool
  depends_on: []
  args:
    pool_name: measles-inference-pool
    mounts:
    - source: input-test
      target: input-test
    container_image_name: measles-script:v1
    autoscale: true
    max_autoscale_nodes: 4
- id: create_job_schedule_measles
  method: create_job_schedule
  depends_on:
  - create_pool_measles
  args:
    job_schedule_name: measles-inference-daily
    pool_name: measles-inference-pool
    command: if [ $(date +%u) -lt 6 ]; then python /app/infer.py --input /mnt/input-test/$(date
      +%Y-%m-%d); fi
    timeout: 7200
    start_window:
      days: 0
      hours: 21
      minutes: 0
    recurrence_interval:
      days: 1
      hours: 0
      minutes: 0
